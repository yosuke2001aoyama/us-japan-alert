name: Monitor JP-US news

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: jpus-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Collect and notify
        env:
          PUBLIC_DASHBOARD_URL: ${{ vars.PUBLIC_DASHBOARD_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
        run: node scripts/monitor.mjs
      - name: Save latest snapshot
        run: |
          if git diff --quiet -- public/data/feed.json; then exit 0; fi
          git config user.name "jpus-alert[bot]"
          git config user.email "jpus-alert[bot]@users.noreply.github.com"
          git add public/data/feed.json
          git commit -m "data: refresh alert feed"
          git push
