name: Monitor JP-US news

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: jpus-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Collect and notify
        env:
          FEED_ENDPOINT: https://jpus-alert.yosuke2001aoyama.chatgpt.site/api/feed
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ALERT_ASSIGNEE: ${{ github.repository_owner }}
        run: node scripts/monitor.mjs
      - name: Save latest snapshot
        run: |
          if git diff --quiet -- public/data/feed.json; then exit 0; fi
          git config user.name "jpus-alert[bot]"
          git config user.email "jpus-alert[bot]@users.noreply.github.com"
          git add public/data/feed.json
          git commit -m "data: refresh alert feed"
          git push
